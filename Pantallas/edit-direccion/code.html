        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background antialiased min-h-screen flex justify-center">
<div class="w-full max-w-[1280px] bg-surface flex flex-col relative overflow-hidden shadow-[0_0_24px_rgba(89,92,94,0.05)]">
<!-- TopAppBar (Task-Focused, suppresses Bottom Nav) -->
<header class="flex items-center justify-between px-container-margin h-14 w-full w-full top-0 sticky bg-surface shadow-sm z-50">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Editar Dirección</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Map Area -->
<div class="relative w-full h-[265px] min-h-[250px] bg-surface-container-high" data-alt="A crisp, clean, modern digital map interface centered on Madrid, Spain. The map uses a light-mode color palette with soft greys for roads, pristine white for city blocks, and subtle primary blue accents for water bodies or major routes. The style is efficient and corporate, resembling a premium navigation service, free of clutter or labels, emphasizing a trustworthy and rejuvenating aesthetic." data-location="Madrid" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCC2BzLU8gLppp6vE97SSIAqt37KQynAtkMZN0Tq3Jecf-5oa_UmwotxJin7o9mggZYpPKttJD4enEp02wWQkcuR_SSmbj1_Ds6SheuI-Xs5RhR0soHppiihzo9vsp6srmVezNyWuuEk4XM0q26MKdA2bf1QXb8fWjtKoXUwKmIVhm_YIKKLnnCmiPcrcCsp_bhRSAZ1_S7lbN6fIObMgIyWnPYPXASefIVsjwyC2MqjESDX9ifT6iI')">
<!-- Center Pin -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center drop-shadow-md">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="w-3 h-1 bg-on-background/20 rounded-[100%] blur-[2px] mt-1"></div>
</div>
</div>
<!-- Form Area -->
<main class="flex-1 flex flex-col px-container-margin py-section-padding bg-surface-container-lowest rounded-t-[1.5rem] -mt-6 relative z-10 shadow-[0_-8px_24px_rgba(89,92,94,0.05)]">
<form class="flex flex-col gap-stack-gap flex-1">
<!-- Label Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="address_label">Etiqueta</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">bookmark</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface rounded-xl border border-outline-variant font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="address_label" type="text" value="Casa"/>
</div>
</div>
<!-- Street Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="street">Calle y número</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">signpost</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface rounded-xl border border-outline-variant font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="street" type="text" value="Calle de la Victoria 15, 3ºB"/>
</div>
</div>
<div class="flex gap-inline-gap">
<!-- City Field -->
<div class="flex flex-col gap-1 flex-[2]">
<label class="font-label-md text-label-md text-on-surface-variant" for="city">Ciudad</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">location_city</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface rounded-xl border border-outline-variant font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="city" type="text" value="Madrid"/>
</div>
</div>
<!-- Postal Code Field -->
<div class="flex flex-col gap-1 flex-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="postal_code">Código Postal</label>
<div class="relative flex items-center">
<input class="w-full h-14 px-4 bg-surface rounded-xl border border-outline-variant font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="postal_code" type="text" value="28012"/>
</div>
</div>
</div>
<div class="flex-1"></div> <!-- Spacer to push button down if screen is tall -->
<!-- Action Area -->
<div class="mt-8 mb-4">
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-button text-button flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="button">
<span class="material-symbols-outlined">save</span>
                        Guardar Cambios
                    </button>
</div>
</form>
</main>
</div>
</body></html>
