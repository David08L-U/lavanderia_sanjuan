<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-safe">

</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim truncate">
                Editar Perfil
            </h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-margin py-stack-gap flex flex-col gap-stack-gap pb-safe overflow-y-auto">
<!-- Profile Picture Section (Bento Style) -->
<div class="flex flex-col items-center justify-center py-6">

<div class="absolute inset-0 bg-inverse-surface/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer" onclick="document.getElementById('photo-modal').classList.remove('opacity-0', 'pointer-events-none'); document.querySelector('#photo-modal &gt; div').classList.remove('translate-y-full');">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
</div>
<button class="absolute bottom-0 right-0 bg-primary-container text-on-primary-container p-2 rounded-full shadow-lg border-2 border-surface active:scale-95 transition-transform" onclick="document.getElementById('photo-modal').classList.remove('opacity-0', 'pointer-events-none'); document.querySelector('#photo-modal &gt; div').classList.remove('translate-y-full');">
<span class="material-symbols-outlined text-[20px]">edit</span>
</button>
</div>
</div>
<!-- Form Fields Container (Glassmorphism/Minimalist Card) -->
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-[0_8px_32px_rgba(0,0,0,0.03)] border border-surface-container-low flex flex-col gap-6">
<!-- Name Field -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="name">Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary opacity-60">person</span>
<input class="w-full bg-surface-container-low focus:bg-surface-container-lowest text-on-surface font-body-lg text-body-lg rounded-xl pl-12 pr-4 py-4 border-2 border-transparent focus:border-primary transition-colors placeholder:text-outline-variant shadow-sm" id="name" placeholder="Your full name" type="text" value="Maria Silva"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary opacity-60">mail</span>
<input class="w-full bg-surface-container-low focus:bg-surface-container-lowest text-on-surface font-body-lg text-body-lg rounded-xl pl-12 pr-4 py-4 border-2 border-transparent focus:border-primary transition-colors placeholder:text-outline-variant shadow-sm" id="email" placeholder="Your email address" type="email" value="maria.silva@example.com"/>
</div>
</div>
<!-- Phone Field -->
<div class="flex flex-col gap-2 relative">

<span class="material-symbols-outlined absolute left-4 text-primary opacity-60">phone</span>

</div>
</div>
</div>
<div class="flex-grow"></div> <!-- Spacer to push button down if needed -->
<!-- Action Button -->

            </button>

<script>
        // Simple input focus effects to enhance the modernist feel
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.remove('opacity-60');
                input.parentElement.querySelector('.material-symbols-outlined').classList.add('opacity-100');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').classList.add('opacity-60');
                input.parentElement.querySelector('.material-symbols-outlined').classList.remove('opacity-100');
            });
        });
    </script>
<!-- Profile Photo Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-end justify-center bg-inverse-surface/30 transition-opacity duration-300" id="photo-modal">

<div class="flex flex-col gap-2"><button class="flex items-center gap-4 p-4 w-full hover:bg-surface-container-low rounded-xl transition-colors text-on-surface"><span class="material-symbols-outlined text-primary">photo_camera</span><span class="font-body-lg">Tomar Foto</span></button><button class="flex items-center gap-4 p-4 w-full hover:bg-surface-container-low rounded-xl transition-colors text-on-surface"><span class="material-symbols-outlined text-primary">image</span><span class="font-body-lg">Elegir de Galería</span></button><button class="flex items-center gap-4 p-4 w-full hover:bg-surface-container-low rounded-xl transition-colors text-error"><span class="material-symbols-outlined">delete</span><span class="font-body-lg">Eliminar Foto Actual</span></button></div>
<button class="mt-6 w-full py-4 font-button text-button text-primary border border-surface-container-high rounded-xl hover:bg-surface-container-low transition-colors" onclick="document.getElementById('photo-modal').classList.add('opacity-0', 'pointer-events-none'); document.querySelector('#photo-modal &gt; div').classList.add('translate-y-full');">Cancelar</button>
</div>
