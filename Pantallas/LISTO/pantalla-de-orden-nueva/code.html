<style>

<div class="flex justify-between items-center px-container-margin h-16 w-full max-w-7xl mx-auto">

<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden">

<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed">FreshClean</h1>
</div>

<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>

<!-- Header Section -->
<section class="flex flex-col gap-2">
<h2 class="font-display-lg text-display-lg text-on-surface">Start a New Order</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Select the services you need today.</p>
</section>
<!-- Core Services Bento Grid -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
<!-- Lavado x Kilo -->
<button class="relative overflow-hidden group rounded-2xl bg-surface-container-lowest border border-outline-variant shadow-[0_8px_24px_rgba(89,92,94,0.05)] hover:border-primary active:scale-[0.98] transition-all duration-200 p-5 flex flex-col items-start gap-4 text-left h-full">
<!-- Decorative Blur -->
<div class="absolute -top-6 -right-6 w-24 h-24 bg-primary-fixed rounded-full blur-2xl opacity-50 group-hover:scale-110 transition-transform"></div>
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center z-10">
<span class="material-symbols-outlined" data-icon="laundry" style="font-variation-settings: 'FILL' 1;">laundry</span>
</div>
<div class="mt-auto z-10 w-full">
<h3 class="font-title-md text-title-md text-on-surface mb-1">Lavado x Kilo</h3>
<p class="font-body-md text-body-md text-on-surface-variant">From $35/kg</p>
</div>
</button>
<!-- Tintorería -->
<button class="relative overflow-hidden group rounded-2xl bg-surface-container-lowest border border-outline-variant shadow-[0_8px_24px_rgba(89,92,94,0.05)] hover:border-primary active:scale-[0.98] transition-all duration-200 p-5 flex flex-col items-start gap-4 text-left h-full">

<div class="w-12 h-12 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center z-10">

</div>
<div class="mt-auto z-10 w-full">
<h3 class="font-title-md text-title-md text-on-surface mb-1">Tintorería</h3>
<p class="font-body-md text-body-md text-on-surface-variant">From $80/item</p>
</div>
</button>
<!-- Planchado -->
<button class="relative overflow-hidden group rounded-2xl bg-surface-container-lowest border border-outline-variant shadow-[0_8px_24px_rgba(89,92,94,0.05)] hover:border-primary active:scale-[0.98] transition-all duration-200 p-5 flex flex-col items-start gap-4 text-left h-full">

<div class="w-12 h-12 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center z-10">

<div class="mt-auto z-10 w-full">

<div class="absolute -top-6 -right-6 w-24 h-24 bg-primary-fixed-dim rounded-full blur-2xl opacity-50 group-hover:scale-110 transition-transform"></div>
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center z-10">
<span class="material-symbols-outlined" data-icon="bed" style="font-variation-settings: 'FILL' 1;">bed</span>
</div>
<div class="mt-auto z-10 w-full">
<h3 class="font-title-md text-title-md text-on-surface mb-1">Edredones</h3>
<p class="font-body-md text-body-md text-on-surface-variant">From $120/ea</p>
</div>
</button>
</section>
<!-- Frequent Items / Quick Reorder -->

</main>

</button>
<button class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-container hover:opacity-80 transition-opacity active:scale-90 duration-150 w-16">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</button>

<script>
        // Simple script to handle bento box selection toggling for demonstration
        document.querySelectorAll('section.grid > button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('ring-2');
                this.classList.toggle('ring-primary');
                this.classList.toggle('bg-surface-blue-tint');
            });
        });
    </script>
