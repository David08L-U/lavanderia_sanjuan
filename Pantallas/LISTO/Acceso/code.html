<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FreshClean - Iniciar Sesión</title>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#005ecb', // Darker blue from the image
              accent: '#007aff',  // Main iOS-style blue
              surface: '#f9f9ff',
              container: '#f0f3ff',
              placeholder: '#94a3b8',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          borderRadius: {
            'custom': '1.5rem', // Soft rounded corners for the main card
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #2b2d31; /* Dark background as seen in the source image crop */
    }
    .main-card {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.05);
    }
    .form-input-container {
      background-color: #f1f5ff; /* Light bluish tint for input areas */
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }
    .form-input-container:focus-within {
      border-color: #007aff;
      background-color: #ffffff;
    }
    .divider-line {
      height: 1px;
      flex-grow: 1;
      background-color: #cbd5e1;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: LoginContainer -->
<main class="w-full max-w-[390px] bg-brand-surface rounded-[40px] overflow-hidden p-8 flex flex-col items-center main-card border-[10px] border-[#e2e8f0]">
<!-- BEGIN: HeaderSection -->
<header class="flex flex-col items-center mb-8" data-purpose="branding">
<!-- App Logo -->
<div class="w-16 h-16 bg-brand-accent rounded-2xl flex items-center justify-center shadow-lg mb-4" data-purpose="app-icon">
<svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<rect height="20" rx="2" ry="2" width="14" x="5" y="2"></rect>
<circle cx="12" cy="14" r="4"></circle>
<line x1="10" x2="14" y1="6" y2="6"></line>
</svg>
</div>
<h1 class="text-3xl font-extrabold text-brand-primary mb-1">FreshClean</h1>
<p class="text-slate-500 text-sm font-medium">Ropa fresca, vida simple.</p>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: LoginForm -->
<form class="w-full space-y-5" data-purpose="login-form">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-600 ml-1" for="email">Correo Electrónico</label>
<div class="form-input-container flex items-center px-4 py-3 rounded-xl">
<svg class="w-5 h-5 text-brand-accent mr-3" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<input class="bg-transparent border-none focus:ring-0 w-full text-slate-700 text-sm p-0 placeholder:text-slate-400" id="email" placeholder="tu@correo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-600 ml-1" for="password">Contraseña</label>
<div class="form-input-container flex items-center px-4 py-3 rounded-xl">
<svg class="w-5 h-5 text-brand-accent mr-3" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<input class="bg-transparent border-none focus:ring-0 w-full text-slate-700 text-sm p-0 placeholder:text-slate-400" id="password" placeholder="••••••••" type="password"/>
<button class="ml-2 text-brand-accent" type="button">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<div class="flex justify-end">
<a class="text-xs font-medium text-brand-accent hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-brand-primary text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-colors mt-2" type="submit">
        Iniciar Sesión
      </button>
</form>
<!-- END: LoginForm -->
<!-- BEGIN: SocialLogin -->
<div class="w-full mt-10" data-purpose="social-auth">
<div class="flex items-center gap-4 mb-8">
<div class="divider-line"></div>
<span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">O continuar con</span>
<div class="divider-line"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3.5 bg-brand-container rounded-2xl hover:bg-blue-100 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C9.03,19.27 6.48,16.84 6.48,12C6.48,7.16 9.03,4.73 12.19,4.73C14.77,4.73 16.7,6.33 16.7,6.33L18.73,4.14C18.73,4.14 15.97,1.85 12.19,1.85C6.69,1.85 2.42,6.13 2.42,12C2.42,17.87 6.69,22.15 12.19,22.15C17.5,22.15 21.66,18.41 21.66,12.79C21.66,11.73 21.35,11.1 21.35,11.1Z" fill="currentColor"></path>
</svg>
<span class="text-sm font-bold text-slate-800">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3.5 bg-brand-container rounded-2xl hover:bg-blue-100 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v2h-2zm0 4h2v6h-2z" fill="currentColor"></path>
<!-- Simplified grid icon representing Apple option as per layout -->
<path d="M16 11h2v2h-2zM12 11h2v2h-2zM8 11h2v2h-2zM16 7h2v2h-2zM12 7h2v2h-2zM8 7h2v2h-2zM16 15h2v2h-2zM12 15h2v2h-2zM8 15h2v2h-2z" fill="currentColor"></path>
</svg>
<span class="text-sm font-bold text-slate-800">Apple</span>
</button>
</div>
</div>
<!-- END: SocialLogin -->
<!-- BEGIN: Footer -->
<footer class="mt-auto pt-10 pb-2">
<p class="text-sm text-slate-500">
        ¿No tienes cuenta? <a class="text-brand-accent font-bold hover:underline" href="#">Crea una</a>
</p>
</footer>
<!-- END: Footer -->
</main>
<!-- END: LoginContainer -->
</body></html>
