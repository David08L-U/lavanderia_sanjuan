                      "secondary": "#54606b",

                      "on-primary-container": "#fefcff",

                      "on-surface-variant": "#414755",
                      "on-error-container": "#93000a",

                      "inverse-surface": "#263143",

                      "surface-dim": "#cfdaf2",
                      "tertiary-container": "#727577",
                      "surface-container": "#e7eeff",
                      "primary": "#0058bc",
                      "secondary-fixed": "#d8e4f2",
                      "primary-fixed-dim": "#adc6ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",

              },
              "spacing": {
                      "inline-gap": "0.75rem",

                      "section-padding": "2rem",
                      "container-margin": "1.25rem"

              "fontFamily": {

              "fontSize": {

<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Top Navigation (Task-focused, linear flow implies back button) -->
<header class="flex items-center justify-between px-container-margin h-16 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm sticky top-0">
<button aria-label="Volver" class="w-10 h-10 flex items-center justify-center text-primary hover:opacity-80 transition-opacity active:scale-95 rounded-full">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold tracking-tight">FreshClean</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col">
<!-- Hero Image -->
<div class="relative w-full h-64 md:h-80 bg-surface-container-high overflow-hidden shadow-[0_8px_24px_rgba(0,88,188,0.06)]">
<img class="w-full h-full object-cover" data-alt="A pristine, brightly lit professional dry cleaning environment. Row of freshly pressed suits and delicate coats hanging neatly in protective covers. The lighting is soft, cool, and even, emphasizing cleanliness and premium fabric care. The color palette is dominated by crisp whites and subtle cool greys with hints of fresh blue. The overall mood is organized, hygienic, and highly professional." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFDAOgo-NRnZXvXygSqmQk8AIbF39NEljv9BZhxB8BATZjhfAmapWMXiZA6W7DAkXUjd1vOg238u4ZPocHHl3Kgmxf3K9tsxBzupINOaIpFW-SslXCKDR8ZGrCZKZys3-HbcY9uxE6JiAotLwoX3wRNDyQfUIT7bC7nwhYijv09YDGNLfa5iPZoi_kHZvXuAf-I35ryN9XNAfb16Cff68o8b-OMjKzvK4UyWm_MisF47wPbi8_yBFd"/>
<!-- Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/20 to-transparent"></div>
<!-- Badge -->
<div class="absolute bottom-4 left-container-margin">
<span class="inline-flex items-center px-3 py-1 rounded-full bg-primary text-on-primary font-label-md text-label-md shadow-md">
<span class="material-symbols-outlined text-[14px] mr-1" style="font-variation-settings: 'FILL' 1;">star</span>
                    Oferta Semanal
                </span>
</div>
</div>
<!-- Content Section -->
<div class="px-container-margin py-section-padding flex-grow flex flex-col gap-stack-gap max-w-2xl mx-auto w-full">
<!-- Header Text -->
<div class="space-y-2">
<h2 class="font-display-lg text-display-lg text-primary">20% OFF en Tintorería</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Aprovecha nuestra oferta semanal en todas tus prendas delicadas.</p>
</div>
<!-- Details List -->
<div class="bg-surface-container-low rounded-xl p-4 border border-secondary-container mt-2">
<ul class="space-y-3">
<li class="flex items-start">
<span class="material-symbols-outlined text-primary mr-3 mt-0.5">event</span>
<span class="font-body-md text-body-md text-on-surface">Válido hasta el 30 de Octubre</span>
</li>
<li class="flex items-start">
<span class="material-symbols-outlined text-primary mr-3 mt-0.5">checkroom</span>
<span class="font-body-md text-body-md text-on-surface">Aplica para trajes, vestidos y abrigos</span>
</li>
</ul>
</div>
<!-- Promo Code Card -->
<div class="glass-card rounded-xl p-6 mt-4 shadow-[0_12px_32px_-4px_rgba(0,88,188,0.08)] text-center relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-fixed opacity-50 rounded-full blur-2xl"></div>
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-secondary-fixed opacity-50 rounded-full blur-2xl"></div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-2">Código de Promoción</p>
<div class="flex items-center justify-between bg-surface border-2 border-primary border-dashed rounded-lg p-3">
<span class="font-display-lg text-[28px] leading-[36px] font-bold text-primary tracking-widest pl-2" id="promoCode">FRESH20</span>
<button class="flex items-center justify-center bg-secondary-container text-primary hover:bg-surface-container-high active:scale-95 transition-all px-4 py-2 rounded-lg font-button text-button h-full ml-4" onclick="copyCode()">
<span class="material-symbols-outlined mr-1 text-[18px]">content_copy</span>
                        Copiar
                    </button>
</div>
<p class="font-label-md text-label-md text-primary mt-2 opacity-0 transition-opacity absolute bottom-2 left-0 w-full text-center" id="copyFeedback">¡Código copiado!</p>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="px-container-margin py-4 pb-safe bg-surface/90 backdrop-blur-md border-t border-outline-variant/20 sticky bottom-0 z-40">
<div class="max-w-2xl mx-auto flex flex-col gap-3">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-[16px] font-button text-button flex items-center justify-center hover:bg-primary/90 active:scale-[0.98] transition-all shadow-[0_4px_12px_rgba(0,88,188,0.2)]">
                Usar Ahora
            </button>
<a class="text-center font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors underline-offset-4 hover:underline" href="#">
                Términos y condiciones aplicables
            </a>
</div>
</div>
<script>
        function copyCode() {
            const code = document.getElementById('promoCode').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const feedback = document.getElementById('copyFeedback');
                feedback.classList.remove('opacity-0');
                feedback.classList.add('opacity-100');
                setTimeout(() => {
                    feedback.classList.remove('opacity-100');
                    feedback.classList.add('opacity-0');
                }, 2000);
            });
        }
    </script>
</body></html>
