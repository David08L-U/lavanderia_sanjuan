<!DOCTYPE html>

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .input-focus-ring:focus-within {
            border-color: #0058bc;
            box-shadow: 0 0 0 2px rgba(0, 88, 188, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Header (Translating TopAppBar from JSON manually since it's a structural template, modifying title and leading icon) -->
<header class="flex items-center justify-between px-container-margin h-14 w-full top-0 sticky bg-surface shadow-sm z-40">
<button aria-label="Volver" class="p-2 -ml-2 rounded-full hover:opacity-80 transition-opacity active:scale-95 text-primary" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary flex-1 text-center">Cambiar Contraseña</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-margin py-section-padding max-w-md mx-auto w-full flex flex-col gap-stack-gap">
<!-- Instructional Text -->
<p class="font-body-lg text-body-lg text-on-surface-variant mb-4">
            Ingresa tu contraseña actual y la nueva para actualizar tu seguridad.
        </p>
<!-- Form Area -->
<form class="flex flex-col gap-stack-gap">
<!-- Current Password -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="current_password">Contraseña Actual</label>
<div class="relative flex items-center bg-secondary-fixed rounded-xl px-4 py-3 border border-transparent transition-colors input-focus-ring group">
<span class="material-symbols-outlined text-secondary mr-3 text-[20px]">lock</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-body-lg text-body-lg placeholder-secondary" id="current_password" placeholder="Ingresa tu contraseña actual" type="password"/>
<button aria-label="Mostrar contraseña" class="p-1 -mr-1 text-secondary hover:text-primary transition-colors toggle-password" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="new_password">Nueva Contraseña</label>
<div class="relative flex items-center bg-secondary-fixed rounded-xl px-4 py-3 border border-transparent transition-colors input-focus-ring group">
<span class="material-symbols-outlined text-secondary mr-3 text-[20px]">key</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-body-lg text-body-lg placeholder-secondary" id="new_password" placeholder="Crea una nueva contraseña" type="password"/>
<button aria-label="Mostrar contraseña" class="p-1 -mr-1 text-secondary hover:text-primary transition-colors toggle-password" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Confirm New Password -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="confirm_password">Confirmar Nueva Contraseña</label>
<div class="relative flex items-center bg-secondary-fixed rounded-xl px-4 py-3 border border-transparent transition-colors input-focus-ring group">
<span class="material-symbols-outlined text-secondary mr-3 text-[20px]">verified_user</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-body-lg text-body-lg placeholder-secondary" id="confirm_password" placeholder="Repite la nueva contraseña" type="password"/>
<button aria-label="Mostrar contraseña" class="p-1 -mr-1 text-secondary hover:text-primary transition-colors toggle-password" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Security Tip Card (Bento/Glassmorphism style) -->
<div class="mt-2 p-4 rounded-xl glass-card bg-surface-container-high/50 flex items-start gap-3 shadow-[0_4px_16px_rgba(0,0,0,0.02)]">
<div class="bg-primary-container/10 p-2 rounded-full text-primary mt-1">
<span class="material-symbols-outlined text-[20px]">security</span>
</div>
<div>
<h3 class="font-title-md text-title-md text-primary mb-1">Consejo de Seguridad</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Usa al menos 8 caracteres, una mayúscula y un número.</p>
</div>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<div class="p-container-margin pb-safe mt-auto">
<button class="w-full bg-primary text-on-primary font-button text-button h-[56px] rounded-[16px] hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_8px_16px_rgba(0,88,188,0.15)] flex items-center justify-center gap-2" type="button">
<span>Actualizar Contraseña</span>
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</button>
</div>
<!-- Navigation Suppressed: Transactional/Task-focused sub-page -->
<script>
        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('.material-symbols-outlined');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        });

        // Focus styling enhancement
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.remove('bg-secondary-fixed');
                this.parentElement.classList.add('bg-surface-lowest');
            });
            input.addEventListener('blur', function() {
                this.parentElement.classList.add('bg-secondary-fixed');
                this.parentElement.classList.remove('bg-surface-lowest');
            });
        });
    </script>
</body></html>
