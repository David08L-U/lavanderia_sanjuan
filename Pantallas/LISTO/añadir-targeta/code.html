<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>

<style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: theme('colors.background');
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .input-field {
            background-color: theme('colors.surface-container-lowest');
            border: 1px solid transparent;
            transition: all 0.2s ease-in-out;
        }

        .input-field:focus-within {
            background-color: theme('colors.surface-container-lowest');
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 4px theme('colors.surface-container-high');
        }

        /* Ambient subtle shadow for cards */
        .ambient-shadow {
            box-shadow: 0 8px 24px -4px rgba(84, 96, 107, 0.06);
        }
        
        /* Custom toggle switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: theme('colors.primary');
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: theme('colors.primary');
        }
        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: theme('colors.outline-variant');
            transition: all 0.2s ease;
        }
        .toggle-label {
            width: 3rem;
            height: 1.5rem;
            background-color: theme('colors.surface-variant');
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .toggle-label::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 1.25rem;
            height: 1.25rem;
            background-color: theme('colors.on-primary');
            border-radius: 50%;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .toggle-checkbox:checked + .toggle-label::after {
            transform: translateX(1.5rem);
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col font-sans">
<!-- Top Navigation (Task-focused, linear flow, so we use a back button style header, suppressing main app shell) -->
<header class="fixed top-0 w-full z-50 bg-background/90 backdrop-blur-md">
<div class="flex justify-between items-center px-container-margin h-16 w-full max-w-lg mx-auto">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant transition-colors text-on-surface active:scale-95 duration-200" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-semibold absolute left-1/2 -translate-x-1/2">Add Card</h1>
<div class="w-10 h-10"></div> <!-- Spacer for flex balance -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-container-margin max-w-lg mx-auto w-full">
<!-- Virtual Card Preview (Bento-style element) -->
<div class="w-full aspect-[1.586/1] rounded-xl overflow-hidden relative ambient-shadow mb-8 group">
<!-- Dynamic abstract background pattern -->
<div class="absolute inset-0 bg-gradient-to-br from-primary to-primary-container opacity-90"></div>
<div class="absolute inset-0" style="background-image: radial-gradient(circle at 100% 100%, rgba(255,255,255,0.2) 0%, transparent 50%), radial-gradient(circle at 0% 0%, rgba(255,255,255,0.1) 0%, transparent 50%);"></div>
<div class="relative h-full p-6 flex flex-col justify-between text-on-primary">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-3xl opacity-80" style="font-variation-settings: 'FILL' 1;">contactless</span>
<!-- Generic Card Logo Placeholder -->
<div class="flex space-x-1">
<div class="w-6 h-6 rounded-full bg-on-primary/60 mix-blend-screen"></div>
<div class="w-6 h-6 rounded-full bg-on-primary/60 mix-blend-screen -ml-2"></div>
</div>
</div>
<div class="space-y-4">
<div class="font-headline-lg-mobile text-headline-lg-mobile tracking-widest opacity-90 font-mono">
                        **** **** **** 1234
                    </div>
<div class="flex justify-between items-end opacity-80">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider mb-1">Cardholder</span>
<span class="font-label-md text-label-md truncate max-w-[150px]">Jane Doe</span>
</div>
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-wider mb-1">Expires</span>
<span class="font-label-md text-label-md">MM/YY</span>
</div>
</div>
</div>
</div>
</div>
<!-- Form Section -->
<form class="space-y-stack-gap">
<!-- Cardholder Name -->
<div class="flex flex-col space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="cardName">Cardholder Name</label>
<div class="input-field rounded-xl flex items-center px-4 py-1 ambient-shadow">
<span class="material-symbols-outlined text-outline mr-3" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full h-12 bg-transparent border-none outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline-variant" id="cardName" placeholder="e.g. Jane Doe" type="text"/>
</div>
</div>
<!-- Card Number -->
<div class="flex flex-col space-y-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="cardNumber">Card Number</label>
<div class="input-field rounded-xl flex items-center px-4 py-1 ambient-shadow">
<span class="material-symbols-outlined text-outline mr-3" style="font-variation-settings: 'FILL' 0;">credit_card</span>
<input class="w-full h-12 bg-transparent border-none outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline-variant font-mono" id="cardNumber" inputmode="numeric" pattern="[0-9\s]{13,19}" placeholder="0000 0000 0000 0000" type="text"/>
<span class="material-symbols-outlined text-primary ml-2 hidden" id="cardBrandIcon" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Expiration and CVV Row -->
<div class="flex space-x-inline-gap">
<!-- Expiration Date -->
<div class="flex flex-col space-y-1 flex-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="expDate">Expiry Date</label>
<div class="input-field rounded-xl flex items-center px-4 py-1 ambient-shadow">
<span class="material-symbols-outlined text-outline mr-3" style="font-variation-settings: 'FILL' 0;">calendar_month</span>
<input class="w-full h-12 bg-transparent border-none outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline-variant" id="expDate" placeholder="MM/YY" type="text"/>
</div>
</div>
<!-- CVV -->
<div class="flex flex-col space-y-1 flex-1">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="cvv">CVV</label>
<div class="input-field rounded-xl flex items-center px-4 py-1 ambient-shadow">
<span class="material-symbols-outlined text-outline mr-3" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full h-12 bg-transparent border-none outline-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline-variant" id="cvv" inputmode="numeric" pattern="[0-9]{3,4}" placeholder="123" type="text"/>
</div>
</div>
</div>
<!-- Settings / Toggles (Bento-style row) -->
<div class="mt-8 bg-surface-container-lowest rounded-xl p-4 ambient-shadow flex items-center justify-between">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div>
<div class="font-title-md text-title-md text-on-surface">Set as primary</div>
<div class="font-body-md text-body-md text-on-surface-variant">Use for all future orders</div>
</div>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer opacity-0" id="primaryToggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer" for="primaryToggle"></label>
</div>
</div>
</form>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-background/90 backdrop-blur-md pb-safe pt-4 px-container-margin z-50">
<div class="max-w-lg mx-auto pb-6">
<button class="w-full h-[56px] bg-primary text-on-primary rounded-xl font-button text-button flex items-center justify-center space-x-2 hover:bg-primary-container transition-colors shadow-lg active:scale-95 duration-150" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">save</span>
<span>Save Card</span>
</button>
<div class="text-center mt-3 flex items-center justify-center space-x-1 opacity-70">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-label-md text-label-md">Secure encrypted connection</span>
</div>
</div>
</div>
<!-- Scripts for basic interaction (formatting card numbers) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cardInput = document.getElementById('cardNumber');
            const expInput = document.getElementById('expDate');
            
            // Basic card number formatting (add space every 4 digits)
            cardInput.addEventListener('input', function (e) {
                let target = e.target;
                let position = target.selectionEnd;
                let length = target.value.length;
                
                target.value = target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
                
                if (position !== length) {
                    target.selectionEnd = position;
                }
            });

            // Basic expiration date formatting
            expInput.addEventListener('input', function (e) {
                let target = e.target;
                let val = target.value.replace(/[^\d]/g, '');
                if (val.length > 2) {
                    target.value = val.substring(0, 2) + '/' + val.substring(2, 4);
                } else {
                    target.value = val;
                }
            });
        });
    </script>
</body></html>
