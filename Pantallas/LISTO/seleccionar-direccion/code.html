<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center">
<!-- Top Navigation Shell -->
<header class="w-full top-0 sticky z-30 bg-surface shadow-sm flex items-center justify-between px-container-margin h-14">
<div class="flex items-center gap-4">
<button aria-label="Volver" class="active:scale-95 transition-transform duration-150 text-primary">

</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Seleccionar Dirección</h1>
</div>
<button aria-label="Agregar Dirección" class="active:scale-95 transition-transform duration-150 text-primary">
<span class="material-symbols-outlined text-[24px]">add</span>
</button>
</header>
<main class="w-full max-w-md flex-1 flex flex-col pb-32">
<!-- Map Preview Section -->
<section class="mt-4 px-container-margin">
<div class="relative w-full h-44 rounded-xl overflow-hidden shadow-sm group">
<div class="absolute inset-0 bg-surface-variant animate-pulse" id="map-loading-state"></div>
<div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-105" data-alt="A clean, minimalist vector-style city map of Mexico City with soft blue and white tones. The map features elegant, thin-line street grids and subtle water features in a fresh sky blue. A single circular pin in a deep professional blue marks a central point, illuminated by a soft glow that creates a modern, high-end digital aesthetic." data-location="Mexico City" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC0Abw-UPdR805hXyGnDKq2f0kr6GcN0h1Glm9q0yCBCFgUx9184g_XaL761bDo_nanzRoNgkE7TsetX2HxWvrovpQvZu-wuliD3WhRU0-lkiVCkv8bvFssyyUJ-6dTK2v3PAqYrSI-9cDCO6JlsdGLDT8mn0W-2hmXjKwmeHwG0Ryrf2S3S7wmP83tqXEAadpBtEiudP9wpnEKaxj04RBKoca5PYiijJhPCMPgtRGrBDSzoKLpIkMd')">
</div>
<div class="absolute bottom-3 left-3 bg-surface/90 backdrop-blur-md px-3 py-1.5 rounded-full flex items-center gap-2 border border-surface-variant">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="text-label-md font-label-md text-on-surface">Ubicación Actual</span>
</div>
</div>
</section>
<!-- Address List Title -->
<section class="mt-8 px-container-margin">
<h2 class="text-title-md font-title-md text-on-surface mb-4">Mis Lugares</h2>
<div class="flex flex-col gap-stack-gap" id="address-container">
<!-- Address Card: Casa (Selected) -->
<div class="selected-card cursor-pointer flex items-center justify-between p-4 bg-surface-container-lowest border border-surface-variant rounded-xl transition-all duration-200 hover:shadow-md" onclick="selectAddress(this)">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<div>
<p class="text-body-lg font-title-md text-on-surface">Casa</p>
<p class="text-body-md text-on-surface-variant mt-0.5">Av. Paseo de la Reforma 123, Juárez, CDMX, 06600</p>
</div>
</div>
<div class="ml-4 shrink-0">
<div class="radio-circle w-6 h-6 rounded-full border-2 border-primary radio-active flex items-center justify-center transition-colors"></div>
</div>
</div>
<!-- Address Card: Oficina -->
<div class="cursor-pointer flex items-center justify-between p-4 bg-surface-container-lowest border border-surface-variant rounded-xl transition-all duration-200 hover:shadow-md group" onclick="selectAddress(this)">

<div class="w-10 h-10 rounded-full bg-surface-variant/50 flex items-center justify-center shrink-0 group-hover:bg-primary-container/5 transition-colors">

</div>
<div>
<p class="text-body-lg font-title-md text-on-surface">Oficina</p>
<p class="text-body-md text-on-surface-variant mt-0.5">Calle Hamburgo 45, Piso 10, Juárez, CDMX, 06600</p>
</div>
</div>
<div class="ml-4 shrink-0">
<div class="radio-circle w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors"></div>
</div>
</div>
<!-- Address Card: Gimnasio -->
<div class="cursor-pointer flex items-center justify-between p-4 bg-surface-container-lowest border border-surface-variant rounded-xl transition-all duration-200 hover:shadow-md group" onclick="selectAddress(this)">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-surface-variant/50 flex items-center justify-center shrink-0 group-hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">fitness_center</span>
</div>
<div>
<p class="text-body-lg font-title-md text-on-surface">Gimnasio</p>
<p class="text-body-md text-on-surface-variant mt-0.5">Av. Insurgentes Sur 800, Col del Valle, CDMX, 03100</p>
</div>
</div>
<div class="ml-4 shrink-0">
<div class="radio-circle w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors"></div>
</div>
</div>
</div>

<!-- New Address Quick Action -->

<!-- Fixed Bottom Action Button -->
<div class="fixed bottom-0 left-0 w-full p-container-margin bg-gradient-to-t from-background via-background/95 to-transparent pt-8 pb-10 z-40 max-w-md left-1/2 -translate-x-1/2">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-button text-button shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-95 transition-all hover:opacity-90" id="confirm-button">
            Confirmar Dirección
            <span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</div>
<!-- Micro-interaction Script -->
<script>
        function selectAddress(element) {
            // Remove active styles from all cards
            const allCards = document.querySelectorAll('#address-container > div');
            allCards.forEach(card => {
                card.classList.remove('selected-card');
                const radio = card.querySelector('.radio-circle');
                radio.classList.remove('radio-active', 'border-primary');
                radio.classList.add('border-outline-variant');
                
                // Icon styling reset
                const iconContainer = card.querySelector('.shrink-0 div');
                iconContainer.classList.remove('bg-primary-container/10');
                iconContainer.classList.add('bg-surface-variant/50');
                const icon = iconContainer.querySelector('span');
                icon.classList.remove('text-primary');
                icon.style.fontVariationSettings = "'FILL' 0";
            });

            // Add active styles to clicked card
            element.classList.add('selected-card');
            const activeRadio = element.querySelector('.radio-circle');
            activeRadio.classList.add('radio-active', 'border-primary');
            activeRadio.classList.remove('border-outline-variant');

            // Icon styling active
            const activeIconContainer = element.querySelector('.shrink-0 div');
            activeIconContainer.classList.add('bg-primary-container/10');
            activeIconContainer.classList.remove('bg-surface-variant/50');
            const activeIcon = activeIconContainer.querySelector('span');
            activeIcon.classList.add('text-primary');
            activeIcon.style.fontVariationSettings = "'FILL' 1";

            // Visual feedback on button
            const confirmBtn = document.getElementById('confirm-button');
            confirmBtn.classList.add('scale-105');
            setTimeout(() => confirmBtn.classList.remove('scale-105'), 200);
        }

        // Initialize first card state if not already handled by static HTML correctly
        document.addEventListener('DOMContentLoaded', () => {
            const mapLoading = document.getElementById('map-loading-state');
            setTimeout(() => {
                mapLoading.classList.add('opacity-0');
                setTimeout(() => mapLoading.style.display = 'none', 500);
            }, 1000);
        });
    </script>
