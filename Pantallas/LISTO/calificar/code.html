<script>
        // Simple star rating interactivity for demonstration
        document.querySelectorAll('#main-rating button').forEach((btn, index, btns) => {
            btn.addEventListener('click', () => {
                btns.forEach((b, i) => {
                    const icon = b.querySelector('span');
                    if(i <= index) {
                        b.classList.replace('text-secondary-fixed-dim', 'text-primary');
                        icon.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        b.classList.replace('text-primary', 'text-secondary-fixed-dim');
                        icon.style.fontVariationSettings = "'FILL' 0";
                    }
                });
            });
        });
    </script>
