<script>
        // Micro-interactions for chips
        const chips = document.querySelectorAll('.flex.flex-wrap button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('bg-primary');
                chip.classList.toggle('text-white');
                chip.classList.toggle('bg-surface-container-high');
                chip.classList.toggle('text-primary');
            });
        });

        // Auto-select radio visual feedback on load
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.querySelectorAll('.card-content').forEach(c => {
                    c.classList.remove('border-primary', 'bg-surface-container-low');
                    c.querySelector('.check-icon').classList.add('opacity-0', 'scale-75');
                    c.querySelector('.check-icon').classList.remove('opacity-100', 'scale-100');
                });
                if (radio.checked) {
                    const card = radio.nextElementSibling;
                    card.classList.add('border-primary', 'bg-surface-container-low');
                    card.querySelector('.check-icon').classList.remove('opacity-0', 'scale-75');
                    card.querySelector('.check-icon').classList.add('opacity-100', 'scale-100');
                }
            });
        });

        // Initialize state
        window.addEventListener('DOMContentLoaded', () => {
            const activeRadio = document.querySelector('input[type="radio"]:checked');
            if (activeRadio) {
                const card = activeRadio.nextElementSibling;
                card.classList.add('border-primary', 'bg-surface-container-low');
                card.querySelector('.check-icon').classList.remove('opacity-0', 'scale-75');
                card.querySelector('.check-icon').classList.add('opacity-100', 'scale-100');
            }
        });
    </script>
