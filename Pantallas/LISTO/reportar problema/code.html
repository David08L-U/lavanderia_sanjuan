<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>FreshClean - Report an Issue</title>

                        "on-tertiary-fixed-variant": "#444749",
                        "surface-container-high": "#dee8ff",
                        "on-secondary": "#ffffff",
                        "inverse-primary": "#adc6ff",
                        "outline": "#717786",
                        "surface-variant": "#d8e3fb",
                        "error": "#ba1a1a",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Radio Button Styling */
        input[type="radio"]:checked + div {
            border-color: #0058bc;
            background-color: #f9f9ff;
        }
        input[type="radio"]:checked + div .icon-container {
            background-color: #0058bc;
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-safe">
<!-- TopAppBar: Transactional Page so minimal shell -->
<header class="flex items-center justify-between px-container-margin h-16 w-full z-50 bg-surface/80 backdrop-blur-md sticky top-0 border-b border-outline-variant/20">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container-low transition-colors text-primary active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface flex-1 text-center pr-8">Reportar un Problema</h1>
<!-- Invisible spacer to balance the back button -->
<div class="w-10"></div>
</header>
<main class="flex-1 overflow-y-auto px-container-margin py-stack-gap space-y-section-padding">
<!-- Order Summary Context -->
<section class="bg-surface-container-low rounded-xl p-4 flex items-center gap-4 border border-outline-variant/30">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined icon-fill">receipt_long</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Orden Actual</p>
<p class="font-title-md text-title-md text-on-surface">#FC-12345</p>
</div>
<button class="ml-auto text-primary font-label-md text-label-md underline hover:opacity-80">Ver Detalles</button>
</section>
<!-- Issue Categories (Bento-ish Grid) -->
<section class="space-y-4">
<h2 class="font-title-md text-title-md text-on-surface">¿Qué salió mal?</h2>
<div class="grid grid-cols-2 gap-3">
<label class="cursor-pointer relative">
<input class="peer sr-only" name="issue_type" type="radio"/>
<div class="bg-surface rounded-xl p-4 border border-outline-variant/30 transition-all hover:bg-surface-container-low h-full flex flex-col items-center text-center gap-2">
<div class="icon-container w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">apparel</span>
</div>
<span class="font-body-md text-body-md font-medium">Prenda Dañada</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="issue_type" type="radio"/>
<div class="bg-surface rounded-xl p-4 border border-outline-variant/30 transition-all hover:bg-surface-container-low h-full flex flex-col items-center text-center gap-2">
<div class="icon-container w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">search_off</span>
</div>
<span class="font-body-md text-body-md font-medium">Falta una Prenda</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="issue_type" type="radio"/>
<div class="bg-surface rounded-xl p-4 border border-outline-variant/30 transition-all hover:bg-surface-container-low h-full flex flex-col items-center text-center gap-2">
<div class="icon-container w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">schedule</span>
</div>
<span class="font-body-md text-body-md font-medium">Retraso en Entrega</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="issue_type" type="radio"/>
<div class="bg-surface rounded-xl p-4 border border-outline-variant/30 transition-all hover:bg-surface-container-low h-full flex flex-col items-center text-center gap-2">
<div class="icon-container w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">water_drop</span>
</div>
<span class="font-body-md text-body-md font-medium">Calidad de Lavado</span>
</div>
</label>
<label class="cursor-pointer relative col-span-2">
<input class="peer sr-only" name="issue_type" type="radio"/>
<div class="bg-surface rounded-xl p-4 border border-outline-variant/30 transition-all hover:bg-surface-container-low flex items-center gap-3">
<div class="icon-container w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary transition-colors">
<span class="material-symbols-outlined">more_horiz</span>
</div>
<span class="font-body-md text-body-md font-medium flex-1">Otro problema</span>
</div>
</label>
</div>
</section>
<!-- Detailed Description -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<label class="font-title-md text-title-md text-on-surface" for="details">Detalles</label>
<span class="font-label-md text-label-md text-on-surface-variant">Opcional</span>
</div>
<textarea class="w-full bg-secondary-container/30 border-none rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface transition-colors resize-none" id="details" placeholder="Cuéntanos más sobre lo sucedido para poder ayudarte mejor..." rows="4"></textarea>
</section>
<!-- File Upload (Evidence) -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<h2 class="font-title-md text-title-md text-on-surface">Evidencia</h2>
<span class="font-label-md text-label-md text-on-surface-variant">Máx 3 fotos</span>
</div>
<div class="flex gap-3 overflow-x-auto pb-2 -mx-container-margin px-container-margin">
<!-- Upload Button -->
<button class="shrink-0 w-24 h-24 rounded-xl border-2 border-dashed border-primary/50 bg-secondary-container/20 flex flex-col items-center justify-center text-primary hover:bg-secondary-container/40 transition-colors">
<span class="material-symbols-outlined mb-1">add_a_photo</span>
<span class="font-label-md text-label-md">Añadir</span>
</button>
<!-- Placeholder for uploaded image -->
<div class="shrink-0 w-24 h-24 rounded-xl border border-outline-variant/30 bg-surface-container-low overflow-hidden relative group">
<img class="w-full h-full object-cover" data-alt="A close up photo of a damaged shirt collar, showing frayed edges and a small tear. The lighting is bright and clinical, emphasizing the damage against a clean white background. Modern, minimalist composition." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzUxQKb630vT6yHDedWQFKOphR8c7zrgiPn4OdxOjPj77bUj9Y3vwIVol2UlhMxA9aDrqKXaZI-X16z651xtS0-qhnkASgWa3Kun0wJU6ZmgfIH9Hb-pMRxeH5D9R2Uemwx-3iSGvRSWc_a_pCoVnyvPA-FF8woJmP8g1K_EfMp7bH0orNyZqFeJea-8-fM0lUO7mFgvkzZf92o8kzJmaiPXfQm3zgv7_U2ux37nGw-_S-Wdvl1jR2"/>
<button class="absolute top-1 right-1 w-6 h-6 bg-surface/80 backdrop-blur rounded-full flex items-center justify-center text-error opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined" style="font-size: 14px;">close</span>
</button>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<div class="p-container-margin bg-surface border-t border-outline-variant/20 pb-safe shadow-[0_-4px_24px_0_rgba(17,28,45,0.05)]">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-button text-button flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" style="font-size: 20px;">send</span>
            Enviar Reporte
        </button>
</div>
</body></html>
