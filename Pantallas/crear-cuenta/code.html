<!DOCTYPE html><html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            box-shadow: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:flex-row antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Desktop Split Layout: Left side Hero Image -->
<div class="hidden md:flex md:w-1/2 relative bg-surface-container-low overflow-hidden items-center justify-center">
<div class="absolute inset-0 bg-cover bg-center w-full h-full opacity-90" data-alt="A pristine, modern laundry room bathed in bright, soft natural light pouring through a large window. Clean white folding tables are neatly arranged. A minimal composition using a monochromatic blue palette with deep blacks, crisp whites, and fresh blue accents. The mood is serene, hygienic, and highly organized, reflecting a premium service experience." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAQCR0-P-6Fq94KfsHyx4T9n3be7j5HvAtu4Jn1JiL_QuHbw7OosThW0GhrwA--FLW1ggaRghGJJjS90EV3AXTsqM2_CE1oxVd2CpphRBrQ-ZxjM659BCMdDc4whj9AAB8cNzLKZqdA3g87Z6FBphd7wVnjclRzjUuOyDOPE2hWk4I6JqsoJAT9a2L1up9LAAKasr5HPVDkVZplAYBs94ZHdsS8WLXLrjM6xgtrCMRsqcQUjhc24c_siKPCXh3vEdXBRAiG_fFLmoI')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-60"></div>
<div class="relative z-10 p-12 max-w-lg text-center backdrop-blur-sm bg-surface/30 rounded-2xl border border-surface-container shadow-[0_16px_24px_rgba(17,28,45,0.04)] mx-8">
<span class="material-symbols-outlined text-6xl text-primary mb-4" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<h1 class="font-display-lg text-display-lg text-on-surface mb-4">FreshClean</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Únete a nosotros y disfruta de un servicio de lavandería premium, rápido y sin complicaciones.</p>
</div>
</div>
<!-- Right Side: Form Content -->
<div class="w-full md:w-1/2 flex flex-col min-h-screen relative">
<!-- Top App Bar (Minimal for transactional screen) -->
<header class="flex items-center justify-between px-container-margin py-4 w-full fixed top-0 md:absolute z-50 bg-background/80 backdrop-blur-md md:bg-transparent md:backdrop-blur-none border-b border-surface-variant/30 md:border-none">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full text-on-secondary-container hover:bg-surface-container transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="md:hidden font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">water_drop</span> FreshClean
            </div>
<div class="w-10 h-10 md:hidden"></div> <!-- Spacer for flex balance -->
</header>
<!-- Main Form Container -->
<main class="flex-1 flex flex-col justify-center px-container-margin py-24 md:py-12 max-w-md mx-auto w-full">
<div class="mb-8">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Crear Cuenta</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Ingresa tus datos para comenzar.</p>
</div>
<form class="space-y-4">
<div class="grid grid-cols-2 gap-4">
<!-- Nombre Input -->
<div class="relative group">
<label class="sr-only" for="firstName">Nombre</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full h-14 pl-11 pr-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50" id="firstName" name="firstName" placeholder="Nombre" required="" type="text">
</div>
<!-- Apellido Input -->
<div class="relative group">
<label class="sr-only" for="lastName">Apellido</label>
<input class="w-full h-14 px-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50" id="lastName" name="lastName" placeholder="Apellido" required="" type="text">
</div>
</div>
<!-- Correo Input -->
<div class="relative group">
<label class="sr-only" for="email">Correo Electrónico</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-14 pl-11 pr-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="Correo Electrónico" required="" type="email">
</div>
<!-- Teléfono Input -->
<div class="relative group">
<label class="sr-only" for="phone">Teléfono</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined text-[20px]">call</span>
</div>
<input class="w-full h-14 pl-11 pr-4 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50" id="phone" name="phone" placeholder="Teléfono" required="" type="tel">
</div>
<!-- Contraseña Input -->
<div class="relative group">
<label class="sr-only" for="password">Contraseña</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-14 pl-11 pr-12 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="Contraseña" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Confirmar Contraseña Input -->
<div class="relative group mb-2">
<label class="sr-only" for="confirmPassword">Confirmar Contraseña</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-primary">
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
</div>
<input class="w-full h-14 pl-11 pr-12 bg-surface-container-low text-on-surface rounded-xl border-none focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all font-body-md text-body-md placeholder:text-on-surface-variant/50" id="confirmPassword" name="confirmPassword" placeholder="Confirmar Contraseña" required="" type="password">
</div>
<!-- Checkbox Términos -->
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 text-primary bg-surface-container-low border-surface-variant rounded focus:ring-primary focus:ring-2 focus:ring-offset-background" id="terms" name="terms" required="" type="checkbox">
</div>
<div class="text-sm">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                            Acepto los <a class="text-primary hover:underline font-medium" href="#">Términos y Condiciones</a> y la <a class="text-primary hover:underline font-medium" href="#">Política de Privacidad</a>
</label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-14 mt-4 bg-primary text-on-primary rounded-xl font-button text-button flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-[0.98] transition-all shadow-sm" type="submit">
                    Registrarse
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Bottom Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    ¿Ya tienes cuenta? 
                    <a class="text-primary font-medium hover:underline transition-all" href="#">Inicia Sesión</a>
</p>
</div>
</main>
</div>
</body></html>
