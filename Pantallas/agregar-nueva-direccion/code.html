<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>FreshClean - Add New Address</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#727784",
                        "surface-container-low": "#f0f3ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#cfdaf2",
                        "on-secondary-fixed-variant": "#3c4853",
                        "primary-fixed": "#d8e2ff",
                        "secondary-fixed-dim": "#bbc8d5",
                        "on-tertiary-container": "#d2d4d7",
                        "primary-container": "#0058bc",
                        "on-error-container": "#93000a",
                        "surface-tint": "#095bbf",
                        "surface": "#f9f9ff",
                        "surface-container": "#e7eeff",
                        "background": "#f9f9ff",
                        "surface-blue-tint": "#e7eeff",
                        "on-primary-fixed-variant": "#004494",
                        "secondary-container": "#d7e4f1",
                        "inverse-surface": "#263143",
                        "primary": "#00418f",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#191c1e",
                        "on-tertiary-fixed-variant": "#444749",
                        "on-surface-variant": "#424753",
                        "inverse-on-surface": "#ecf1ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#111d26",
                        "surface-variant": "#d8e3fb",
                        "primary-fixed-dim": "#adc6ff",
                        "on-surface": "#111c2d",
                        "on-primary-container": "#c3d4ff",
                        "inverse-primary": "#adc6ff",
                        "success-blue": "#0070eb",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#e1e3e5",
                        "error-container": "#ffdad6",
                        "tertiary": "#414546",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#001a41",
                        "on-secondary-container": "#5a6671",
                        "surface-container-high": "#dee8ff",
                        "surface-bright": "#f9f9ff",
                        "tertiary-container": "#595c5e",
                        "surface-container-highest": "#d8e3fb",
                        "on-background": "#111c2d",
                        "secondary-fixed": "#d7e4f1",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "outline-variant": "#c2c6d5",
                        "secondary": "#54606b",
                        "error-red": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "hero-padding": "2.5rem",
                        "container-margin": "1.25rem",
                        "section-padding": "2rem",
                        "inline-gap": "0.75rem",
                        "stack-gap": "1rem"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "button": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "title-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "button": ["16px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col pt-safe pb-safe selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Navigation (Context: Task-Focused / Form - Hidden nav shell as per rules) -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm h-16 flex items-center px-container-margin justify-between pt-safe">
<button class="text-on-surface-variant hover:bg-surface-variant p-2 rounded-full transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface text-center flex-1 pr-10">Add New Address</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[1280px] mx-auto mt-16 flex flex-col relative md:px-container-margin pb-[88px] md:pb-section-padding">
<!-- Map Preview Area -->
<section class="relative w-full h-[250px] md:h-[350px] bg-surface-container-low md:rounded-xl md:mt-section-padding overflow-hidden shadow-[0_4px_24px_rgba(89,92,94,0.05)] border-b border-outline-variant md:border">
<img class="w-full h-full object-cover" data-alt="A clean, modern top-down map view of a city grid. The map style is light and minimal, using soft blues and warm greys consistent with the FreshClean brand identity. A stylized, glowing primary blue location pin is placed precisely in the center of the map, casting a soft ambient shadow on the crisp white and grey streets below." data-location="New York" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRdmt0b8DMfZfXqx3yZ-8KVAvi58ZeKJZqd1fpLjuHqzeW1S7jmspV4gOPQewyBJP8Bwm7xxwZHZq0pTjORn8uKfnVh8GYI3HA74f0dRt61mPTtLRcCadJ_no5EfhiS-swGoIeyqDjkHdY-mpXvwWhqCdCYmp1yVlHkwzkjHyMgByms-TBGdNRQaXDi5fkSPYrOWl-Qd-qkfBrUNLMxMxp9oGjq1wBgT9afENvvtro9VWnN2NF0bfA"/>
<!-- Floating Pin Marker (Center of map) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none pb-8">
<div class="relative flex flex-col items-center">
<div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center shadow-[0_8px_16px_rgba(0,65,143,0.3)] border-4 border-surface animate-bounce-subtle">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="w-3 h-1 bg-on-background opacity-20 rounded-full blur-[2px] mt-1"></div>
</div>
</div>
<!-- Map Overlay Controls -->
<button class="absolute bottom-4 right-4 bg-surface text-primary p-3 rounded-full shadow-[0_4px_16px_rgba(89,92,94,0.1)] active:scale-95 transition-transform hover:bg-surface-variant border border-outline-variant pointer-events-auto">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">my_location</span>
</button>
</section>
<!-- Form Section -->
<section class="px-container-margin py-section-padding flex-1 md:bg-surface md:shadow-[0_4px_24px_rgba(89,92,94,0.05)] md:rounded-xl md:-mt-8 md:relative md:z-10 border border-transparent md:border-outline-variant md:mx-auto md:w-full md:max-w-2xl">
<div class="mb-stack-gap">
<h2 class="font-title-md text-title-md text-on-surface mb-2">Address Details</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter the precise location for your FreshClean services.</p>
</div>
<form class="flex flex-col gap-stack-gap w-full" id="address-form">
<!-- Address Name (e.g., Home, Office) -->
<div class="flex flex-col gap-1 w-full relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="address_name">Address Label</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-variation-settings: 'FILL' 0;">label</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm placeholder:text-outline/60" id="address_name" placeholder="e.g. Home, Office" type="text"/>
</div>
</div>
<!-- Street and Number -->
<div class="flex flex-col gap-1 w-full relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="street_address">Street &amp; Number</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-variation-settings: 'FILL' 0;">signpost</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm placeholder:text-outline/60" id="street_address" placeholder="123 Main St" type="text"/>
</div>
</div>
<!-- Apartment / Suite -->
<div class="flex flex-col gap-1 w-full relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="apt_suite">Apartment, Suite, etc. <span class="text-outline font-normal">(Optional)</span></label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-variation-settings: 'FILL' 0;">apartment</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm placeholder:text-outline/60" id="apt_suite" placeholder="Apt 4B" type="text"/>
</div>
</div>
<!-- City & Postal Code Row -->
<div class="flex gap-inline-gap w-full">
<div class="flex flex-col gap-1 w-2/3 relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="city">City</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" style="font-variation-settings: 'FILL' 0;">location_city</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm placeholder:text-outline/60" id="city" placeholder="New York" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1 w-1/3 relative">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="postal_code">Postal Code</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors shadow-sm placeholder:text-outline/60" id="postal_code" placeholder="10001" type="text"/>
</div>
</div>
</form>
</section>
</main>
<!-- Bottom Action Area (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-md border-t border-outline-variant px-container-margin py-4 pb-safe md:relative md:bg-transparent md:border-none md:backdrop-blur-none md:max-w-[1280px] md:mx-auto z-40">
<button class="w-full h-14 md:w-auto md:min-w-[200px] md:float-right bg-primary text-on-primary font-button text-button rounded-full flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-[0_4px_16px_rgba(0,65,143,0.2)] hover:bg-on-primary-fixed-variant" type="button">
            Save Address
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</body></html>
