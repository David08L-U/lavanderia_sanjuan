<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center p-container-margin">
<!-- Main Container -->
<main class="w-full max-w-md bg-surface shadow-[0_16px_24px_rgba(17,28,45,0.04)] rounded-[24px] p-6 flex flex-col gap-8 relative overflow-hidden">
<!-- Subtle decorative background element -->
<div class="absolute top-0 right-0 -mt-16 -mr-16 w-48 h-48 bg-surface-container rounded-full opacity-50 blur-2xl pointer-events-none"></div>
<!-- Header / Logo -->
<header class="flex flex-col items-center gap-2 mt-4 z-10">
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-2xl flex items-center justify-center mb-2 shadow-lg">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_laundry_service</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary text-center">FreshClean</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Ropa fresca, vida simple.</p>
</header>
<!-- Form Container (Toggleable) -->
<div class="z-10 w-full flex flex-col gap-6" id="form-container">
<!-- Login Form -->
<form class="flex flex-col gap-stack-gap" id="login-form" onsubmit="event.preventDefault(); const email = document.getElementById('login-email').value; if(email.includes('@')) { window.location.href = '{{DATA:SCREEN:SCREEN_30}}'; } else { alert('Por favor, introduce un correo electrónico válido.'); }">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="login-email">Correo Electrónico</label>
<div class="flex items-center bg-surface-container-low rounded-2xl px-4 py-3 h-14 input-focus-ring transition-colors">
<span class="material-symbols-outlined text-primary mr-3">mail</span>
<input class="w-full bg-transparent outline-none font-body-lg text-body-lg text-on-surface placeholder-outline" id="login-email" placeholder="tu@correo.com" required="" type="email">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="login-password">Contraseña</label>
<div class="flex items-center bg-surface-container-low rounded-2xl px-4 py-3 h-14 input-focus-ring transition-colors">
<span class="material-symbols-outlined text-primary mr-3">lock</span>
<input class="w-full bg-transparent outline-none font-body-lg text-body-lg text-on-surface placeholder-outline" id="login-password" placeholder="••••••••" required="" type="password">
<button class="text-primary hover:text-primary-container transition-colors" onclick="togglePasswordVisibility('login-password')" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end mt-[-8px]">
<a class="font-label-md text-label-md text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<button class="mt-2 w-full h-[56px] bg-primary text-on-primary font-button text-button rounded-[16px] flex items-center justify-center gap-2 hover:bg-primary-container active:scale-95 transition-all shadow-md" type="submit">
                    Iniciar Sesión
                </button>
</form>
<!-- Registration Form (Hidden by default) -->
<form class="hidden flex-col gap-stack-gap" id="register-form" onsubmit="event.preventDefault(); window.location.href = '{{DATA:SCREEN:SCREEN_30}}'">
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-name">Nombre Completo</label>
<div class="flex items-center bg-surface-container-low rounded-2xl px-4 py-3 h-14 input-focus-ring transition-colors">
<span class="material-symbols-outlined text-primary mr-3">person</span>
<input class="w-full bg-transparent outline-none font-body-lg text-body-lg text-on-surface placeholder-outline" id="reg-name" placeholder="Juan Pérez" required="" type="text">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-phone">Teléfono</label>
<div class="flex items-center bg-surface-container-low rounded-2xl px-4 py-3 h-14 input-focus-ring transition-colors">
<span class="material-symbols-outlined text-primary mr-3">phone</span>
<input class="w-full bg-transparent outline-none font-body-lg text-body-lg text-on-surface placeholder-outline" id="reg-phone" placeholder="+34 600 000 000" required="" type="tel">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-email">Correo Electrónico</label>
<div class="flex items-center bg-surface-container-low rounded-2xl px-4 py-3 h-14 input-focus-ring transition-colors">
<span class="material-symbols-outlined text-primary mr-3">mail</span>
<input class="w-full bg-transparent outline-none font-body-lg text-body-lg text-on-surface placeholder-outline" id="reg-email" placeholder="tu@correo.com" required="" type="email">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-password">Contraseña</label>
<div class="flex items-center bg-surface-container-low rounded-2xl px-4 py-3 h-14 input-focus-ring transition-colors">
<span class="material-symbols-outlined text-primary mr-3">lock</span>
<input class="w-full bg-transparent outline-none font-body-lg text-body-lg text-on-surface placeholder-outline" id="reg-password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="reg-password-confirm">Confirmar Contraseña</label>

</div>
</div>
<button class="mt-2 w-full h-[56px] bg-primary text-on-primary font-button text-button rounded-[16px] flex items-center justify-center gap-2 hover:bg-primary-container active:scale-95 transition-all shadow-md" type="submit">
                    Crear Cuenta
                </button>

</div>

<div class="flex-grow h-px bg-outline-variant"></div>

<div class="flex-grow h-px bg-outline-variant"></div>
</div>

<div class="flex gap-4 w-full z-10">
<button class="flex-1 h-14 bg-surface-container border border-surface-dim rounded-2xl flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 text-on-surface font-button text-button" onclick="window.location.href = '{{DATA:SCREEN:SCREEN_30}}'">
<span class="material-symbols-outlined">android</span>
                Google
            </button>
<button class="flex-1 h-14 bg-surface-container border border-surface-dim rounded-2xl flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 text-on-surface font-button text-button" onclick="window.location.href = '{{DATA:SCREEN:SCREEN_30}}'">
<span class="material-symbols-outlined">apps</span>
                Apple
            </button>
</div>
<!-- Toggle View Link -->
<div class="mt-4 text-center z-10">
<p class="font-body-md text-body-md text-on-surface-variant" id="toggle-text">
                ¿No tienes cuenta? 
                <button class="text-primary font-title-md hover:underline bg-transparent border-none p-0 cursor-pointer" onclick="toggleForm()">Crea una</button>
</p>
</div>
</main>
<script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('.material-symbols-outlined');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        let isLogin = true;
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const toggleText = document.getElementById('toggle-text');

            if (isLogin) {
                loginForm.style.display = 'none';
                loginForm.classList.remove('flex');
                registerForm.style.display = 'flex';
                registerForm.classList.remove('hidden');
                
                toggleText.innerHTML = `¿Ya tienes cuenta? <button onclick="toggleForm()" class="text-primary font-title-md hover:underline bg-transparent border-none p-0 cursor-pointer">Inicia sesión</button>`;
            } else {
                registerForm.style.display = 'none';
                registerForm.classList.remove('flex');
                loginForm.style.display = 'flex';
                loginForm.classList.remove('hidden');
                
                toggleText.innerHTML = `¿No tienes cuenta? <button onclick="toggleForm()" class="text-primary font-title-md hover:underline bg-transparent border-none p-0 cursor-pointer">Crea una</button>`;
            }
            isLogin = !isLogin;
        }
    </script>
