name: fronted
description: "A new Flutter project."
# La siguiente línea evita que el paquete se publique por accidente
# en pub.dev usando `flutter pub publish`. Se recomienda para paquetes privados.
publish_to: 'none' # Elimina esta línea si quieres publicar en pub.dev

# Lo siguiente define la versión y el número de build de tu aplicación.
# El número de versión son tres números separados por puntos, como 1.2.43,
# seguido de un número de build opcional separado por un +.
# Tanto la versión como el número de build pueden sobrescribirse al hacer
# el build especificando --build-name y --build-number, respectivamente.
# En Android, build-name se usa como versionName y build-number como versionCode.
# Más sobre versionado en Android: https://developer.android.com/studio/publish/versioning
# En iOS, build-name se usa como CFBundleShortVersionString y build-number como CFBundleVersion.
# Más sobre versionado en iOS:
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# En Windows, build-name se usa para las partes major, minor y patch
# de la versión del producto/archivo, y build-number como sufijo del build.
version: 1.0.0+1

environment:
  sdk: ^3.12.2

# Las dependencias son otros paquetes que tu paquete necesita para funcionar.
# Para actualizar automáticamente tus dependencias a las últimas versiones
# corre `flutter pub upgrade --major-versions`. También puedes actualizarlas
# manualmente cambiando los números de versión abajo por la última versión
# disponible en pub.dev. Para ver qué dependencias tienen versiones nuevas,
# corre `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Lo siguiente agrega la fuente de íconos Cupertino a tu aplicación.
  # Se usa junto con la clase CupertinoIcons para íconos estilo iOS.
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # El paquete "flutter_lints" de abajo trae un set de reglas recomendadas
  # para fomentar buenas prácticas de código. Ese set de reglas se activa
  # en el archivo `analysis_options.yaml` en la raíz del paquete. Ahí puedes
  # ver cómo desactivar reglas específicas o activar otras.
  flutter_lints: ^6.0.0

# Para info sobre la parte genérica de Dart en este archivo, ver:
# https://dart.dev/tools/pub/pubspec

# La siguiente sección es específica de los paquetes de Flutter.
flutter:

  # La siguiente línea asegura que la fuente Material Icons se incluya
  # en tu aplicación, para poder usar los íconos de la clase Icons.
  uses-material-design: true

  # Para agregar assets a tu aplicación, agrega una sección assets, así:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # Un asset de imagen puede tener una o más "variantes" según su resolución,
  # ver: https://flutter.dev/to/resolution-aware-images

  # Para detalles sobre cómo agregar assets desde paquetes dependientes, ver:
  # https://flutter.dev/to/asset-from-package

  # Para agregar fuentes personalizadas, agrega una sección fonts aquí,
  # dentro de esta sección "flutter". Cada entrada de la lista debe tener
  # una clave "family" con el nombre de la familia tipográfica, y una clave
  # "fonts" con la lista de assets y demás descriptores de la fuente. Ej:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # Para detalles sobre fuentes desde paquetes dependientes, ver:
  # https://flutter.dev/to/font-from-package
